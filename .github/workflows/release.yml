name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mnemonic-linux-x86_64
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: mnemonic-macos-x86_64
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: mnemonic-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: dashboard/.node-version
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard
        run: |
          cd dashboard
          npm ci
          npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build slim binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build dashboard binary
        run: cargo build --release --target ${{ matrix.target }} --features dashboard

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/mnemonic dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/mnemonic dist/${{ matrix.artifact }}-dashboard
          tar -czf dist/${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }}
          tar -czf dist/${{ matrix.artifact }}-dashboard.tar.gz -C dist ${{ matrix.artifact }}-dashboard

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.tar.gz

  regression:
    name: Default Binary Regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build default binary
        run: cargo build

      - name: Run tests
        run: cargo test

  release:
    name: Publish GitHub Release
    needs: [build, regression]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '**/*.tar.gz'
